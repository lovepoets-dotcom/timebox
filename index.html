<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elon Musk Time Box Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TimeBox">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>TIME BOX PLANNER</h1>
            <p class="subtitle">Inspired by Elon Musk's Productivity Method</p>
        </header>

        <main class="grid-layout">
            <!-- Left Side: Brain Dump & Priorities -->
            <section class="panel sidebar">
                <div class="card brain-dump">
                    <h2>01. Brain Dump</h2>
                    <div class="input-group">
                        <input type="text" id="todo-input" placeholder="Enter a task...">
                        <button id="add-btn">Add</button>
                    </div>
                    <ul id="todo-list"></ul>
                </div>

                <div class="card priorities">
                    <h2>02. Top 3 Priorities</h2>
                    <ol id="priority-list">
                        <li><input type="text" placeholder="Priority 1"></li>
                        <li><input type="text" placeholder="Priority 2"></li>
                        <li><input type="text" placeholder="Priority 3"></li>
                    </ol>
                </div>
            </section>

            <!-- Right Side: Time Box Schedule -->
            <section class="panel schedule">
                <div class="card schedule-card">
                    <div class="schedule-header">
                        <h2>03. Time Boxing</h2>
                        <span id="current-date"></span>
                    </div>
                    <div class="time-slots" id="time-slots">
                        <!-- Slots will be generated by JS -->
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="tips">
                <p>"Focus on signal over noise. Don't waste time on stuff that doesn't actually make things better." -
                    Elon Musk</p>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error: ', err));
            });
        }
    </script>
</body>

</html>
